name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Typecheck, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/plott_ci
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      # Build-time imports touch Neon Auth config; provide non-production
      # placeholders so module evaluation succeeds in CI.
      NEON_AUTH_BASE_URL: https://example.neon.tech
      NEON_AUTH_COOKIE_SECRET: ci-cookie-secret-not-for-prod
      LANGFUSE_DISABLE: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --legacy-peer-deps

      - name: Prisma generate
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
